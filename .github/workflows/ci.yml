name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      EXCHANGE_URL: http://localhost:5098
      BOT_COUNT: 3
      BOT_1_EMAIL: bot1@excentra.com
      BOT_1_PASSWORD: password
      BOT_1_ROLE: maker
      BOT_1_SPREAD: "0.002"
      BOT_1_INTERVAL_SECS: "10"
      BOT_1_STALE_THRESHOLD: "0.005"
      BOT_1_ORDER_CAP: "3"
      BOT_2_EMAIL: bot2@excentra.com
      BOT_2_PASSWORD: password
      BOT_2_ROLE: taker
      BOT_2_INTERVAL_SECS: "15"
      BOT_3_EMAIL: bot3@excentra.com
      BOT_3_PASSWORD: password
      BOT_3_ROLE: maker
      BOT_3_SPREAD: "0.008"
      BOT_3_INTERVAL_SECS: "20"
      BOT_3_STALE_THRESHOLD: "0.015"
      BOT_3_ORDER_CAP: "5"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test